<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signare PDF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Sacramento&family=Pacifico&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs" type="module"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: #16213e; border-bottom: 1px solid #0f3460; flex-shrink: 0; flex-wrap: wrap; }
  .toolbar-title { font-size: 18px; font-weight: 700; color: #e94560; margin-right: 16px; }
  .toolbar button, .toolbar label { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .toolbar button:hover, .toolbar label:hover { background: #0f3460; border-color: #e94560; }
  .toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }
  .toolbar button:disabled:hover { background: #1a1a2e; border-color: #0f3460; }
  .toolbar input[type="file"] { display: none; }
  .toolbar .spacer { flex: 1; }
  .toolbar .save-btn { background: #e94560; border-color: #e94560; color: #fff; font-weight: 600; }
  .toolbar .save-btn:hover { background: #c73650; }
  .toolbar .save-btn:disabled { background: #1a1a2e; border-color: #0f3460; color: #e0e0e0; }

  /* Main viewer */
  .viewer { flex: 1; overflow: auto; display: flex; justify-content: center; padding: 24px; background: #1a1a2e; }
  .viewer .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 18px; gap: 12px; }
  .viewer .placeholder svg { opacity: 0.3; }

  .page-container { position: relative; display: inline-block; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
  .page-container canvas { display: block; }
  .field-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

  /* Fields */
  .field { position: absolute; pointer-events: all; cursor: move; padding: 2px 6px; border: 2px dashed transparent; border-radius: 3px; white-space: nowrap; user-select: none; transition: border-color 0.15s; min-width: 30px; min-height: 20px; }
  .field:hover, .field.selected { border-color: #e94560; }
  .field .delete-btn { display: none; position: absolute; top: -12px; right: -12px; width: 22px; height: 22px; background: #e94560; color: #fff; border: none; border-radius: 50%; font-size: 13px; line-height: 22px; text-align: center; cursor: pointer; }
  .field:hover .delete-btn, .field.selected .delete-btn { display: block; }
  .field.signature { color: #1a1a2e; }
  .field.text-field, .field.date-field { color: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

  /* Page nav */
  .page-nav { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 10px; background: #16213e; border-top: 1px solid #0f3460; flex-shrink: 0; }
  .page-nav button { padding: 6px 16px; border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .page-nav button:hover { background: #0f3460; }
  .page-nav button:disabled { opacity: 0.4; cursor: not-allowed; }
  .page-nav span { font-size: 14px; }

  /* Modal */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
  .modal-backdrop.active { display: flex; }
  .modal { background: #16213e; border: 1px solid #0f3460; border-radius: 12px; padding: 24px; width: 460px; max-width: 90vw; }
  .modal h2 { margin-bottom: 16px; font-size: 18px; color: #e94560; }
  .modal label { display: block; font-size: 13px; margin-bottom: 4px; color: #aaa; }
  .modal input[type="text"] { width: 100%; padding: 10px; border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0; border-radius: 6px; font-size: 15px; margin-bottom: 14px; }
  .modal input[type="text"]:focus { outline: none; border-color: #e94560; }
  .font-options { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .font-option { padding: 8px 14px; border: 2px solid #0f3460; background: #1a1a2e; color: #e0e0e0; border-radius: 6px; cursor: pointer; font-size: 18px; transition: all 0.15s; }
  .font-option:hover { border-color: #e94560; }
  .font-option.selected { border-color: #e94560; background: #0f3460; }
  .sig-preview { padding: 16px; background: #fff; border-radius: 6px; margin-bottom: 16px; min-height: 60px; display: flex; align-items: center; justify-content: center; color: #1a1a2e; font-size: 32px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
  .modal-actions button { padding: 8px 20px; border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .modal-actions button.primary { background: #e94560; border-color: #e94560; color: #fff; font-weight: 600; }
  .modal-actions button:hover { opacity: 0.85; }

  /* Field edit input */
  .field-edit-input { border: none; background: transparent; font: inherit; color: inherit; outline: none; padding: 0; min-width: 60px; }
</style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">Signare PDF</span>
  <label>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Open PDF
    <input type="file" id="fileInput" accept=".pdf">
  </label>
  <button id="addSigBtn" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    Add Signature
  </button>
  <button id="addTextBtn" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
    Add Text
  </button>
  <button id="addDateBtn" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Add Date
  </button>
  <div class="spacer"></div>
  <button id="saveBtn" class="save-btn" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Save PDF
  </button>
</div>

<div class="viewer" id="viewer">
  <div class="placeholder" id="placeholder">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span>Open a PDF to get started</span>
    <span style="font-size:14px;color:#444">or drag and drop a file here</span>
  </div>
  <div class="page-container" id="pageContainer" style="display:none;">
    <canvas id="pdfCanvas"></canvas>
    <div class="field-overlay" id="fieldOverlay"></div>
  </div>
</div>

<div class="page-nav" id="pageNav" style="display:none;">
  <button id="prevPage">&#9664; Prev</button>
  <span id="pageInfo">Page 1 of 1</span>
  <button id="nextPage">Next &#9654;</button>
</div>

<!-- Signature Modal -->
<div class="modal-backdrop" id="sigModal">
  <div class="modal">
    <h2>Add Signature</h2>
    <label for="sigText">Your name</label>
    <input type="text" id="sigText" placeholder="Type your name..." autocomplete="off">
    <label>Font style</label>
    <div class="font-options" id="fontOptions">
      <div class="font-option selected" data-font="Dancing Script" style="font-family:'Dancing Script'">Dancing</div>
      <div class="font-option" data-font="Great Vibes" style="font-family:'Great Vibes'">Vibes</div>
      <div class="font-option" data-font="Sacramento" style="font-family:'Sacramento'">Sacramento</div>
      <div class="font-option" data-font="Pacifico" style="font-family:'Pacifico'">Pacifico</div>
    </div>
    <label>Preview</label>
    <div class="sig-preview" id="sigPreview" style="font-family:'Dancing Script'">Your signature</div>
    <div class="modal-actions">
      <button id="sigCancel">Cancel</button>
      <button id="sigPlace" class="primary">Place Signature</button>
    </div>
  </div>
</div>

<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs';

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

const { PDFDocument, rgb, StandardFonts } = PDFLib;

// ── State ──
let pdfDoc = null;          // PDF.js document
let pdfBytes = null;         // Raw PDF bytes for pdf-lib
let currentPage = 1;
let totalPages = 0;
let scale = 1.5;
let fields = [];             // { id, type, page, x, y, text, fontSize, fontFamily }
let nextFieldId = 1;
let selectedField = null;
let dragState = null;


// ── DOM refs ──
const fileInput = document.getElementById('fileInput');
const addSigBtn = document.getElementById('addSigBtn');
const addTextBtn = document.getElementById('addTextBtn');
const addDateBtn = document.getElementById('addDateBtn');
const saveBtn = document.getElementById('saveBtn');
const viewer = document.getElementById('viewer');
const placeholder = document.getElementById('placeholder');
const pageContainer = document.getElementById('pageContainer');
const pdfCanvas = document.getElementById('pdfCanvas');
const fieldOverlay = document.getElementById('fieldOverlay');
const pageNav = document.getElementById('pageNav');
const prevPageBtn = document.getElementById('prevPage');
const nextPageBtn = document.getElementById('nextPage');
const pageInfo = document.getElementById('pageInfo');
const sigModal = document.getElementById('sigModal');
const sigText = document.getElementById('sigText');
const sigPreview = document.getElementById('sigPreview');
const sigPlace = document.getElementById('sigPlace');
const sigCancel = document.getElementById('sigCancel');
const fontOptions = document.getElementById('fontOptions');

// ── PDF Loading ──
fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (file) await loadPDF(file);
});

// Drag and drop
viewer.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
viewer.addEventListener('drop', async (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') await loadPDF(file);
});

async function loadPDF(file) {
  pdfBytes = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes.slice(0) }).promise;
  totalPages = pdfDoc.numPages;
  currentPage = 1;
  fields = [];
  nextFieldId = 1;

  placeholder.style.display = 'none';
  pageContainer.style.display = 'inline-block';
  pageNav.style.display = 'flex';
  addSigBtn.disabled = false;
  addTextBtn.disabled = false;
  addDateBtn.disabled = false;
  saveBtn.disabled = false;

  await renderPage();
}

async function renderPage() {
  const page = await pdfDoc.getPage(currentPage);
  const viewport = page.getViewport({ scale });
  pdfCanvas.width = viewport.width;
  pdfCanvas.height = viewport.height;
  const ctx = pdfCanvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;

  pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
  prevPageBtn.disabled = currentPage <= 1;
  nextPageBtn.disabled = currentPage >= totalPages;

  renderFields();
}

// ── Page Navigation ──
prevPageBtn.addEventListener('click', async () => {
  if (currentPage > 1) { currentPage--; await renderPage(); }
});
nextPageBtn.addEventListener('click', async () => {
  if (currentPage < totalPages) { currentPage++; await renderPage(); }
});

// ── Field Rendering ──
function renderFields() {
  fieldOverlay.innerHTML = '';
  const pageFields = fields.filter(f => f.page === currentPage);
  for (const f of pageFields) {
    const el = document.createElement('div');
    el.className = `field ${f.type}`;
    el.dataset.id = f.id;
    el.style.left = f.x + 'px';
    el.style.top = f.y + 'px';
    el.style.fontSize = f.fontSize + 'px';
    if (f.fontFamily) el.style.fontFamily = `'${f.fontFamily}'`;
    el.textContent = f.text;

    if (selectedField === f.id) el.classList.add('selected');

    // Delete button
    const del = document.createElement('button');
    del.className = 'delete-btn';
    del.textContent = '×';
    del.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      fields = fields.filter(ff => ff.id !== f.id);
      if (selectedField === f.id) selectedField = null;
      renderFields();
    });
    el.appendChild(del);

    // Drag
    el.addEventListener('mousedown', (e) => {
      if (e.target === del) return;
      e.preventDefault();
      selectedField = f.id;
      dragState = { fieldId: f.id, startX: e.clientX, startY: e.clientY, origX: f.x, origY: f.y };
      renderFields();
    });

    // Double-click to edit
    el.addEventListener('dblclick', (e) => {
      e.preventDefault();
      startInlineEdit(f, el);
    });

    fieldOverlay.appendChild(el);
  }
}

function startInlineEdit(field, el) {
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'field-edit-input';
  input.value = field.text;
  input.style.fontSize = field.fontSize + 'px';
  if (field.fontFamily) input.style.fontFamily = `'${field.fontFamily}'`;

  // Clear the element and add input
  const delBtn = el.querySelector('.delete-btn');
  el.textContent = '';
  el.appendChild(input);
  el.appendChild(delBtn);
  input.focus();
  input.select();

  const finish = () => {
    field.text = input.value || field.text;
    renderFields();
  };
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { input.value = field.text; input.blur(); }
  });
}

// Global mouse handlers for dragging
document.addEventListener('mousemove', (e) => {
  if (!dragState) return;
  const f = fields.find(ff => ff.id === dragState.fieldId);
  if (!f) return;
  f.x = dragState.origX + (e.clientX - dragState.startX);
  f.y = dragState.origY + (e.clientY - dragState.startY);

  // Clamp to canvas bounds
  f.x = Math.max(0, f.x);
  f.y = Math.max(0, f.y);
  f.x = Math.min(pdfCanvas.width - 20, f.x);
  f.y = Math.min(pdfCanvas.height - 20, f.y);

  renderFields();
});

document.addEventListener('mouseup', () => { dragState = null; });

// Click on canvas to deselect
fieldOverlay.addEventListener('mousedown', (e) => {
  if (e.target === fieldOverlay) { selectedField = null; renderFields(); }
});

// Delete key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Delete' && selectedField && !document.querySelector('.field-edit-input')) {
    fields = fields.filter(f => f.id !== selectedField);
    selectedField = null;
    renderFields();
  }
});

// ── Add Signature ──
let selectedFont = 'Dancing Script';

addSigBtn.addEventListener('click', () => {
  sigText.value = '';
  sigPreview.textContent = 'Your signature';
  sigPreview.style.fontFamily = `'${selectedFont}'`;
  sigModal.classList.add('active');
  setTimeout(() => sigText.focus(), 100);
});

fontOptions.addEventListener('click', (e) => {
  const opt = e.target.closest('.font-option');
  if (!opt) return;
  document.querySelectorAll('.font-option').forEach(o => o.classList.remove('selected'));
  opt.classList.add('selected');
  selectedFont = opt.dataset.font;
  sigPreview.style.fontFamily = `'${selectedFont}'`;
});

sigText.addEventListener('input', () => {
  sigPreview.textContent = sigText.value || 'Your signature';
});

sigCancel.addEventListener('click', () => { sigModal.classList.remove('active'); });

sigModal.addEventListener('click', (e) => {
  if (e.target === sigModal) sigModal.classList.remove('active');
});

sigPlace.addEventListener('click', () => {
  const text = sigText.value.trim();
  if (!text) { sigText.focus(); return; }

  fields.push({
    id: nextFieldId++,
    type: 'signature',
    page: currentPage,
    x: 100,
    y: pdfCanvas.height / 2,
    text: text,
    fontSize: 32,
    fontFamily: selectedFont,
  });

  sigModal.classList.remove('active');
  renderFields();
});

// ── Add Text ──
addTextBtn.addEventListener('click', () => {
  const f = {
    id: nextFieldId++,
    type: 'text-field',
    page: currentPage,
    x: 100,
    y: pdfCanvas.height / 2,
    text: 'Text here',
    fontSize: 16,
    fontFamily: null,
  };
  fields.push(f);
  selectedField = f.id;
  renderFields();

  // Immediately start editing
  setTimeout(() => {
    const el = fieldOverlay.querySelector(`[data-id="${f.id}"]`);
    if (el) startInlineEdit(f, el);
  }, 50);
});

// ── Add Date ──
addDateBtn.addEventListener('click', () => {
  const today = new Date();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  const yyyy = today.getFullYear();

  fields.push({
    id: nextFieldId++,
    type: 'date-field',
    page: currentPage,
    x: 100,
    y: pdfCanvas.height / 2 + 50,
    text: `${mm}/${dd}/${yyyy}`,
    fontSize: 16,
    fontFamily: null,
  });
  renderFields();
});

// ── Save PDF ──
// Strategy: for each page with fields, render ALL fields onto one full-page
// transparent overlay canvas (same pixel dimensions as the displayed canvas),
// then embed that single image on the PDF page at full size.
// This gives pixel-perfect WYSIWYG — zero per-field coordinate math.
saveBtn.addEventListener('click', async () => {
  if (!pdfBytes || fields.length === 0) return;

  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving...';

  const savedPage = currentPage;

  try {
    const pdfDocLib = await PDFDocument.load(pdfBytes);
    const pages = pdfDocLib.getPages();

    // Group fields by page
    const fieldsByPage = {};
    for (const f of fields) {
      if (!fieldsByPage[f.page]) fieldsByPage[f.page] = [];
      fieldsByPage[f.page].push(f);
    }

    for (const [pageNum, pageFields] of Object.entries(fieldsByPage)) {
      const pageIndex = parseInt(pageNum) - 1;
      if (pageIndex < 0 || pageIndex >= pages.length) continue;
      const page = pages[pageIndex];
      const { width: pageWidth, height: pageHeight } = page.getSize();

      // Switch to this page so the fields are rendered in the DOM
      if (currentPage !== parseInt(pageNum)) {
        currentPage = parseInt(pageNum);
        await renderPage();
      }

      // Hide borders and delete buttons for capture
      fieldOverlay.querySelectorAll('.field').forEach(el => {
        el.style.borderColor = 'transparent';
        el.querySelectorAll('.delete-btn').forEach(b => b.style.display = 'none');
      });

      // Use html2canvas to capture the field overlay exactly as the browser renders it
      const overlayCapture = await html2canvas(fieldOverlay, {
        backgroundColor: null, // transparent background
        scale: 1,              // match CSS pixel size (already at scale via PDF.js)
        useCORS: true,
        width: pdfCanvas.width,
        height: pdfCanvas.height,
      });

      // Restore field styling
      renderFields();

      // Embed the captured overlay as a PNG on the PDF page
      const pngDataUrl = overlayCapture.toDataURL('image/png');
      const pngBytes = await fetch(pngDataUrl).then(r => r.arrayBuffer());
      const img = await pdfDocLib.embedPng(pngBytes);
      page.drawImage(img, { x: 0, y: 0, width: pageWidth, height: pageHeight });
    }

    // Restore original page
    if (currentPage !== savedPage) {
      currentPage = savedPage;
      await renderPage();
    }

    const savedBytes = await pdfDocLib.save();
    const blob = new Blob([savedBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'signed.pdf';
    a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    console.error('Save failed:', err);
    alert('Failed to save PDF. See console for details.');
  } finally {
    // Restore original page if error occurred
    if (currentPage !== savedPage) {
      currentPage = savedPage;
      await renderPage();
    }
    saveBtn.disabled = false;
    saveBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Save PDF`;
  }
});
</script>
</body>
</html>
